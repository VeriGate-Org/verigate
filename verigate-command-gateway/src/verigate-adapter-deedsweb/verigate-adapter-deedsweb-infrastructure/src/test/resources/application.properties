# DeedsWeb Adapter Test Configuration
# Configuration optimized for testing with reduced timeouts and mock settings

# API Configuration (for testing with mock services)
deedsweb.api.baseUrl=http://localhost:8080
deedsweb.connection.timeout.ms=5000
deedsweb.read.timeout.ms=10000

# Reduced Retry Configuration for faster tests
deedsweb.retry.attempts=1
deedsweb.retry.delay.ms=100

# Test Search Parameters
deedsweb.default.limit=5
deedsweb.default.threshold=0.8
deedsweb.default.cutoff=0.6
deedsweb.default.algorithm=logic-v1

# Verbose logging for test debugging
logging.level.verigate.adapter.deedsweb=DEBUG
logging.level.verigate.adapter.deedsweb.infrastructure.http=TRACE
