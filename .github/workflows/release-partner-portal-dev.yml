name: Release | Partner Portal Develop

on:
  push:
    branches:
      - "main"
    paths:
      - "verigate-partner-portal/**"

concurrency:
  group: partner-portal-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: verigate-dev
    concurrency: partner-portal-dev-deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: verigate-partner-portal/package-lock.json

      - name: Install dependencies
        working-directory: verigate-partner-portal
        run: npm ci

      - name: Build
        working-directory: verigate-partner-portal
        env:
          NEXT_PUBLIC_BFF_BASE_URL: ${{ vars.BFF_BASE_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.PORTAL_API_KEY }}
          NEXT_PUBLIC_USE_MOCK: ${{ vars.USE_MOCK }}
          NEXT_PUBLIC_ENV: ${{ vars.ENVIRONMENT_SHORTNAME }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        working-directory: verigate-partner-portal
        run: aws s3 sync out/ s3://${{ vars.STACK_NAME }}-partner-portal-${{ vars.ENVIRONMENT_SHORTNAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ vars.STACK_NAME }}-partner-portal-${{ vars.ENVIRONMENT_SHORTNAME }}.s3.${{ vars.AWS_REGION }}.amazonaws.com'].Id" --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi
