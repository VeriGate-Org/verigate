# DeedsWeb Live Integration Test - CI / Default Configuration
# Live tests are skipped by default; flip integration.test.enabled to true (in
# integration-test-local.properties) and supply credentials to run them.

deedsweb.base.url=http://deedssoap.deeds.gov.za:80/deeds-registration-soap/
deedsweb.connection.timeout.ms=30000
deedsweb.read.timeout.ms=30000

integration.test.enabled=false
integration.test.timeout.seconds=30
