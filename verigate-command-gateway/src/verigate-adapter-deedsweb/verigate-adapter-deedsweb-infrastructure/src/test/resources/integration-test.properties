# OpenSanctions Live Integration Test Configuration
# Copy this file to integration-test-local.properties and add your real API key

# OpenSanctions API Configuration
OPENSANCTIONS_API_KEY=your-api-key-here
OPENSANCTIONS_BASE_URL=https://api.opensanctions.org
OPENSANCTIONS_CONNECTION_TIMEOUT_MS=30000
OPENSANCTIONS_READ_TIMEOUT_MS=30000

# Test Configuration
integration.test.enabled=false
integration.test.timeout.seconds=30
integration.test.dataset=default
integration.test.threshold.score=0.7

# Test person data for matching
test.person.first.name=Vladimir
test.person.last.name=Putin
test.person.birth.date=1952-10-07
test.person.nationality=Russian

# Test company data for matching  
test.company.name=ROSNEFT
test.company.jurisdiction=RU

# Clean test data (should not match sanctions)
clean.person.first.name=John
clean.person.last.name=Smith
clean.person.birth.date=1990-01-01
clean.person.nationality=US