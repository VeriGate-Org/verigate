#
# VeriGate Income Verification Adapter Test Configuration
#

#
# Retry config for Command Handlers (reduced for faster tests)
#
verifications.retry.max-attempts=1
verifications.retry.delay-ms=1

#
# Income Verification API Configuration (test values)
#

# Test timeouts (reduced for faster tests)
income.http.timeout-seconds=5
income.http.retry-attempts=1
income.http.retry-delay-ms=10

#
# Rate Limiting (relaxed for tests)
#
income.rate-limit.requests-per-second=100
income.rate-limit.burst-capacity=200

#
# Monitoring and Logging (enabled for test debugging)
#
income.logging.request-enabled=true
income.logging.response-enabled=true
income.logging.level=DEBUG

#
# Variance threshold for testing
#
income.variance-threshold-percentage=10.0

#
# Test-specific configuration
#
income.test.mock-responses=true
income.test.enable-validation=false