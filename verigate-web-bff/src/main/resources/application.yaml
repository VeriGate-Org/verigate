server:
  port: 8080

spring:
  application:
    name: verigate-web-bff
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    verigate.webbff: DEBUG
    org.springframework.security: WARN

verigate:
  cors:
    allowed-origins: ${VERIGATE_CORS_ALLOWED_ORIGINS:https://*.verigate.co.za,http://localhost:3000}
  aws:
    region: ${AWS_REGION:eu-west-1}
    sqs-endpoint: ${AWS_SQS_ENDPOINT:}
    dynamodb-endpoint: ${AWS_DYNAMODB_ENDPOINT:}
    s3-endpoint: ${AWS_S3_ENDPOINT:}
  documents:
    s3-bucket-name: ${VERIGATE_DOCUMENTS_BUCKET:verigate-documents}
  auth:
    cognito:
      enabled: ${VERIGATE_COGNITO_ENABLED:false}
      user-pool-id: ${VERIGATE_COGNITO_USER_POOL_ID:}
      region: ${VERIGATE_COGNITO_REGION:af-south-1}
      app-client-id: ${VERIGATE_COGNITO_APP_CLIENT_ID:}
    rate-limit:
      enabled: ${VERIGATE_RATE_LIMIT_ENABLED:true}
      default-requests-per-minute: ${VERIGATE_RATE_LIMIT_DEFAULT:100}
    api-keys-table: ${VERIGATE_API_KEYS_TABLE:verigate-api-keys}
  partner-hub:
    table-name: ${VERIGATE_PARTNER_HUB_TABLE:verigate-partner-hub}
  partner:
    create-queue-name: ${VERIGATE_PARTNER_CREATE_QUEUE_NAME:partner-create}
  verification:
    queue-name: ${VERIGATE_VERIFICATION_QUEUE_NAME:verify-party}
    command-store:
      table-name: ${VERIGATE_COMMAND_STORE_TABLE:verigate-command-store}
    response:
      poll-timeout-ms: ${VERIGATE_RESPONSE_POLL_TIMEOUT_MS:50}
      poll-max-attempts: ${VERIGATE_RESPONSE_POLL_MAX_ATTEMPTS:1}
  cases:
    table-name: ${VERIGATE_CASES_TABLE:verigate-cases}
  monitoring:
    subjects-table-name: ${VERIGATE_MONITORING_SUBJECTS_TABLE:verigate-monitored-subjects}
    alerts-table-name: ${VERIGATE_MONITORING_ALERTS_TABLE:verigate-monitoring-alerts}
  ai:
    risk-enhancement:
      table-name: ${VERIGATE_AI_RISK_ENHANCEMENT_TABLE:ai-risk-enhancements}
  risk:
    assessment:
      table-name: ${VERIGATE_RISK_ASSESSMENT_TABLE:verigate-risk-assessments}
  healthcheck:
    overall-timeout-seconds: 25
    snapshot-table-name: ${VERIGATE_HEALTH_SNAPSHOT_TABLE_NAME:health-snapshots}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    kinesis-stream-name: ${VERIGATE_KINESIS_STREAM_NAME:}
    services:
      deedsweb:
        name: DeedsWeb SOAP
        url: ${VERIGATE_HEALTH_DEEDSWEB_URL:}
        protocol: SOAP
        port: 80
      dha:
        name: Home Affairs (DHA)
        url: ${VERIGATE_HEALTH_DHA_URL:}
        protocol: REST
      worldcheck:
        name: WorldCheck One
        url: ${VERIGATE_HEALTH_WORLDCHECK_URL:}
        protocol: REST
      experian:
        name: Experian
        url: ${VERIGATE_HEALTH_EXPERIAN_URL:}
        protocol: REST
      transunion:
        name: TransUnion
        url: ${VERIGATE_HEALTH_TRANSUNION_URL:}
        protocol: REST
      xds:
        name: XDS
        url: ${VERIGATE_HEALTH_XDS_URL:}
        protocol: REST
      cipc:
        name: CIPC
        url: ${VERIGATE_HEALTH_CIPC_URL:}
        protocol: REST
      sars:
        name: SARS eFiling
        url: ${VERIGATE_HEALTH_SARS_URL:}
        protocol: REST
      saqa:
        name: SAQA
        url: ${VERIGATE_HEALTH_SAQA_URL:}
        protocol: REST
      bankserv:
        name: BankServ AVS
        url: ${VERIGATE_HEALTH_BANKSERV_URL:}
        protocol: REST
      lightstone:
        name: Lightstone Property
        url: ${VERIGATE_HEALTH_LIGHTSTONE_URL:}
        protocol: REST
      opensanctions:
        name: OpenSanctions
        url: ${VERIGATE_HEALTH_OPENSANCTIONS_URL:}
        protocol: REST
      yoti:
        name: Yoti Document AI
        url: ${VERIGATE_HEALTH_YOTI_URL:}
        protocol: REST
      idenfy:
        name: iDenfy
        url: ${VERIGATE_HEALTH_IDENFY_URL:}
        protocol: REST
      newsapi:
        name: NewsAPI
        url: ${VERIGATE_HEALTH_NEWSAPI_URL:}
        protocol: REST
  cache:
    enabled: ${VERIGATE_CACHE_ENABLED:true}
    policies:
      max-size: ${VERIGATE_CACHE_POLICIES_MAX_SIZE:500}
      ttl-minutes: ${VERIGATE_CACHE_POLICIES_TTL_MINUTES:60}
    risk-assessments:
      max-size: ${VERIGATE_CACHE_RISK_ASSESSMENTS_MAX_SIZE:1000}
      ttl-minutes: ${VERIGATE_CACHE_RISK_ASSESSMENTS_TTL_MINUTES:30}
    command-status:
      max-size: ${VERIGATE_CACHE_COMMAND_STATUS_MAX_SIZE:2000}
      ttl-minutes: ${VERIGATE_CACHE_COMMAND_STATUS_TTL_MINUTES:5}
