#
# VeriGate CIPC Adapter Configuration
# CIPC Public Data API Integration
#

#
# Retry config for Command Handlers
#
# the maximum number of times an operation should be retried before giving up
verifications.retry.max-attempts=2
verifications.retry.delay-ms=10

#
# CIPC Public Data API Configuration
#

# Base API URL for CIPC Public Data API
# CIPC_BASE_URL=https://cipc-apm-rs-dev.azure-api.net/enterprise/v1

# Authentication credentials (provided via environment variables for security)
# CIPC_API_KEY=your-api-key

#
# HTTP Client Configuration
#

# HTTP timeout settings
cipc.http.timeout-seconds=30
cipc.http.retry-attempts=3
cipc.http.retry-delay-ms=1000

#
# Company Verification Configuration
#

# Company verification ID prefix for generated verification IDs
cipc.company.verification-id-prefix=CIPC-

#
# API Rate Limiting Configuration
#

# Requests per second limit (CIPC has lower limits than other APIs)
cipc.rate-limit.requests-per-second=5

# Burst capacity for rate limiting
cipc.rate-limit.burst-capacity=10

#
# Monitoring and Logging Configuration
#

# Enable detailed request logging (disable in production)
cipc.logging.request-enabled=false

# Enable detailed response logging (disable in production)
cipc.logging.response-enabled=false

# Log level for CIPC operations
cipc.logging.level=INFO

#
# Performance Tuning
#

# Connection pool size for HTTP client
cipc.http.connection-pool-size=5

# Keep-alive timeout for HTTP connections (in seconds)
cipc.http.keep-alive-timeout-seconds=60

# Maximum idle connections
cipc.http.max-idle-connections=3

#
# Data Validation Configuration
#

# Enable enterprise number format validation
cipc.validation.enable-enterprise-number-validation=true

# Enable company data completeness checks
cipc.validation.enable-data-completeness-checks=true

#
# Cache Configuration (for future use)
#

# Enable caching for company data
cipc.cache.enable-company-data=false

# Cache TTL for company data (in minutes)
cipc.cache.company-data-ttl-minutes=15