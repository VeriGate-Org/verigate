<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ficaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="url(#ficaGrad)" stroke="#2563eb" stroke-width="3"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#334155" stroke-width="0.5"/>
  <!-- Shield icon at top -->
  <path d="M100 18 L112 25 L112 36 Q112 43 100 48 Q88 43 88 36 L88 25 Z" fill="#2563eb" opacity="0.85"/>
  <polyline points="95,33 99,38 107,27" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- FICA text -->
  <text x="100" y="88" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" letter-spacing="5">FICA</text>
  <!-- Divider line -->
  <line x1="50" y1="98" x2="150" y2="98" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <!-- COMPLIANT text -->
  <text x="100" y="120" text-anchor="middle" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" letter-spacing="3">COMPLIANT</text>
  <!-- Lower divider -->
  <line x1="55" y1="132" x2="145" y2="132" stroke="#334155" stroke-width="1"/>
  <!-- Shield outline icon centered below -->
  <path d="M100 140 L114 147 L114 158 Q114 167 100 173 Q86 167 86 158 L86 147 Z" fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.6"/>
  <polyline points="95,155 99,160 107,150" fill="none" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Identity Verification text -->
  <text x="100" y="188" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="7" letter-spacing="1.5">IDENTITY VERIFICATION</text>
</svg>