# DeedsWeb Adapter Configuration
# Default values for provider-independent deeds integration

# API Configuration
deedsweb.base.url=https://deedssoap.deeds.gov.za
deedsweb.connection.timeout.ms=30000
deedsweb.read.timeout.ms=60000

# Retry Configuration  
deedsweb.retry.attempts=3
deedsweb.retry.delay.ms=1000

# Logging Configuration
logging.level.verigate.adapter.deedsweb=INFO
logging.level.verigate.adapter.deedsweb.infrastructure.http=DEBUG
