          HANIS_INTEGRATION_ENABLED: "false"
          HANIS_SITE_ID: !Sub "{{resolve:ssm:/${AWS::StackName}/hanis/site_id:1}}"
          HANIS_WORKSTATION_ID: !Sub "{{resolve:ssm:/${AWS::StackName}/hanis/workstation_id:1}}"
