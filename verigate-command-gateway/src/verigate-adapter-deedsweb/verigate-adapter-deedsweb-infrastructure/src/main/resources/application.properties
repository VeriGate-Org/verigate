# DeedsWeb Adapter Configuration
# Defaults for the South African DeedsWeb SOAP registry

# SOAP endpoint
deedsweb.base.url=http://deedssoap.deeds.gov.za:80/deeds-registration-soap/

# Credentials are fetched from AWS Secrets Manager per request.
# The secret payload format is JSON: {"username":"...","password":"..."}
deedsweb.credentials.secret.name=verigate/deedsweb/credentials

# HTTP timeouts for the SOAP transport
deedsweb.connection.timeout.ms=30000
deedsweb.read.timeout.ms=60000

# Retry configuration for transient failures
deedsweb.retry.attempts=3
deedsweb.retry.delay.ms=1000

# Logging
logging.level.verigate.adapter.deedsweb=INFO
logging.level.verigate.adapter.deedsweb.infrastructure.soap=DEBUG
