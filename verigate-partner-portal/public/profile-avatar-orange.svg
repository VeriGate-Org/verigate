      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ea580c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="faceTone" x1="30%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#f9e2b3"/>
