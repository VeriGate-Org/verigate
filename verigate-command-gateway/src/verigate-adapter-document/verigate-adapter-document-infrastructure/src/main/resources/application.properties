# Retry config for Command Handlers
verifications.retry.max-attempts=2
verifications.retry.delay-ms=10

# Document Verification API Configuration
document.api.base-url=https://document-verification-api-dev.verigate.co.za/api/v1

# HTTP Client Configuration
document.http.timeout-seconds=30
document.http.retry-attempts=3
document.http.retry-delay-ms=1000

# API Rate Limiting Configuration
document.rate-limit.requests-per-second=5
document.rate-limit.burst-capacity=10

# Monitoring and Logging Configuration
document.logging.request-enabled=false
document.logging.response-enabled=false
document.logging.level=INFO

# Performance Tuning
document.http.connection-pool-size=5
