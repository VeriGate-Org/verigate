#
# VeriGate Billing Service Configuration
# API Usage Tracking and Billing
#

#
# DynamoDB Table Configuration
# Table names can be overridden via environment variables
#
billing.dynamodb.usage-records-table=verigate-usage-records
billing.dynamodb.usage-summaries-table=verigate-usage-summaries
billing.dynamodb.billing-plans-table=verigate-billing-plans

#
# Kinesis Stream Configuration
#
billing.kinesis.stream-name=verigate-verification-events
billing.kinesis.batch-size=100

#
# Aggregation Configuration
#
billing.aggregation.batch-size=100
billing.aggregation.max-query-page-size=1000

#
# Billing Defaults
#
billing.defaults.monthly-minimum=500.00
billing.defaults.price-per-verification=2.50

#
# Logging Configuration
#
billing.logging.level=INFO
billing.logging.enable-debug=false
