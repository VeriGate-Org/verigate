<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="soc2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="url(#soc2Grad)" stroke="#2563eb" stroke-width="3"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#334155" stroke-width="0.5"/>
  <!-- SOC text -->
  <text x="100" y="72" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" letter-spacing="4">SOC</text>
  <!-- 2 large number -->
  <text x="100" y="115" text-anchor="middle" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold">2</text>
  <!-- TYPE II text -->
  <text x="100" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" letter-spacing="3">TYPE II</text>
  <!-- Divider line -->
  <line x1="55" y1="150" x2="145" y2="150" stroke="#334155" stroke-width="1"/>
  <!-- AICPA text -->
  <text x="100" y="167" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" letter-spacing="2">AICPA</text>
  <!-- Compliant text -->
  <text x="100" y="180" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="8" letter-spacing="1">COMPLIANT</text>
  <!-- Small shield icon at top -->
  <path d="M100 20 L110 26 L110 35 Q110 40 100 44 Q90 40 90 35 L90 26 Z" fill="#2563eb" opacity="0.8"/>
  <polyline points="96,32 99,36 106,28" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>