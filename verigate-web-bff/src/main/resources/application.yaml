server:
  port: 8080

spring:
  application:
    name: verigate-web-bff
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    verigate.webbff: DEBUG
    org.springframework.security: WARN

verigate:
  aws:
    region: ${AWS_REGION:eu-west-1}
    sqs-endpoint: ${AWS_SQS_ENDPOINT:}
    dynamodb-endpoint: ${AWS_DYNAMODB_ENDPOINT:}
  auth:
    cognito:
      enabled: ${VERIGATE_COGNITO_ENABLED:false}
      user-pool-id: ${VERIGATE_COGNITO_USER_POOL_ID:}
      region: ${VERIGATE_COGNITO_REGION:af-south-1}
      app-client-id: ${VERIGATE_COGNITO_APP_CLIENT_ID:}
    rate-limit:
      enabled: ${VERIGATE_RATE_LIMIT_ENABLED:true}
      default-requests-per-minute: ${VERIGATE_RATE_LIMIT_DEFAULT:100}
    api-keys-table: ${VERIGATE_API_KEYS_TABLE:verigate-api-keys}
  partner:
    create-queue-name: ${VERIGATE_PARTNER_CREATE_QUEUE_NAME:partner-create}
  verification:
    routing:
      mappings:
        VERIFICATION_OF_BANK_DETAILS: ${VERIGATE_QUEUE_BANK:QLINK_ADAPTER_QUEUE_NAME}
        BANK_ACCOUNT_VERIFICATION: ${VERIGATE_QUEUE_BANK_ACCOUNT:QLINK_ADAPTER_QUEUE_NAME}
        VERIFICATION_OF_PERSONAL_DETAILS: ${VERIGATE_QUEUE_PERSONAL:WORLDCHECK_ADAPTER_QUEUE_NAME}
        SANCTIONS_SCREENING: ${VERIGATE_QUEUE_SANCTIONS:OPENSANCTIONS_ADAPTER_QUEUE_NAME}
        WATCHLIST_SCREENING: ${VERIGATE_QUEUE_WATCHLIST:OPENSANCTIONS_ADAPTER_QUEUE_NAME}
        IDENTITY_VERIFICATION: ${VERIGATE_QUEUE_IDENTITY:DHA_ADAPTER_QUEUE_NAME}
        COMPANY_VERIFICATION: ${VERIGATE_QUEUE_COMPANY:CIPC_ADAPTER_QUEUE_NAME}
        PROPERTY_OWNERSHIP_VERIFICATION: ${VERIGATE_QUEUE_PROPERTY:DEEDSWEB_ADAPTER_QUEUE_NAME}
        EMPLOYMENT_VERIFICATION: ${VERIGATE_QUEUE_EMPLOYMENT:EMPLOYMENT_ADAPTER_QUEUE_NAME}
        NEGATIVE_NEWS_SCREENING: ${VERIGATE_QUEUE_NEGATIVE_NEWS:NEGATIVENEWS_ADAPTER_QUEUE_NAME}
        FRAUD_WATCHLIST_SCREENING: ${VERIGATE_QUEUE_FRAUD_WATCHLIST:FRAUDWATCHLIST_ADAPTER_QUEUE_NAME}
        DOCUMENT_VERIFICATION: ${VERIGATE_QUEUE_DOCUMENT:DOCUMENT_ADAPTER_QUEUE_NAME}
        QUALIFICATION_VERIFICATION: ${VERIGATE_QUEUE_QUALIFICATION:SAQA_ADAPTER_QUEUE_NAME}
        CREDIT_CHECK: ${VERIGATE_QUEUE_CREDIT:CREDITBUREAU_ADAPTER_QUEUE_NAME}
        TAX_COMPLIANCE_VERIFICATION: ${VERIGATE_QUEUE_TAX:SARS_ADAPTER_QUEUE_NAME}
        INCOME_VERIFICATION: ${VERIGATE_QUEUE_INCOME:INCOME_ADAPTER_QUEUE_NAME}
    command-store:
      table-name: ${VERIGATE_COMMAND_STORE_TABLE:verification-command-store}
    response:
      poll-timeout-ms: ${VERIGATE_RESPONSE_POLL_TIMEOUT_MS:50}
      poll-max-attempts: ${VERIGATE_RESPONSE_POLL_MAX_ATTEMPTS:1}
