# OpenSanctions Adapter Configuration
# Default values for OpenSanctions API integration

# API Configuration
opensanctions.api.baseUrl=https://api.opensanctions.org
opensanctions.connection.timeout.ms=30000
opensanctions.read.timeout.ms=60000

# Retry Configuration  
opensanctions.retry.attempts=3
opensanctions.retry.delay.ms=1000

# Default Search Parameters
opensanctions.default.dataset=sanctions
opensanctions.default.limit=10
opensanctions.default.threshold=0.7
opensanctions.default.cutoff=0.5
opensanctions.default.algorithm=logic-v1

# Logging Configuration
logging.level.verigate.adapter.opensanctions=INFO
logging.level.verigate.adapter.opensanctions.infrastructure.http=DEBUG