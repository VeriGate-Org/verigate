AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: VeriGate Web BFF - Lambda + API Gateway deployment

Parameters:
  ApplicationVersion:
    Type: String
    Description: "The latest version tag for the application"
  EnvironmentShortname:
    Type: String
    Description: "Environment shortname (dev, prod)"
  ApiDomainName:
    Type: String
    Default: ""
    Description: "Custom domain name for API Gateway (leave empty to skip mapping)"
  EnableCustomDomain:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  HasCustomDomain: !Equals [!Ref EnableCustomDomain, "true"]

Globals:
  Function:
    MemorySize: 2048
    Timeout: 30
    Runtime: java21
    Architectures:
      - arm64
    AutoPublishAlias: live
    SnapStart:
      ApplyOn: PublishedVersions
    DeploymentPreference:
      Type: AllAtOnce
    LoggingConfig:
      ApplicationLogLevel: INFO
      LogFormat: JSON
    Environment:
      Variables:
        DD_ENV: !Sub "sds-${EnvironmentShortname}"
        DD_SERVICE: verigate-web-bff
        DD_VERSION: !Ref ApplicationVersion
    VpcConfig:
      SecurityGroupIds:
        - "{{resolve:ssm:/platform/security_groups/verigate_verigate_verification}}"
      SubnetIds:
        - "{{resolve:ssm:/platform/privateSubnet-1}}"
        - "{{resolve:ssm:/platform/privateSubnet-2}}"
        - "{{resolve:ssm:/platform/privateSubnet-3}}"

Resources:
  WebBffApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  WebBffFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !Sub "{{resolve:ssm:/application/iam-role/verigate-web-bff-${EnvironmentShortname}/arn}}"
      FunctionName: !Sub "${AWS::StackName}-api"
      Handler: verigate.webbff.StreamLambdaHandler
      CodeUri: ../../
      Environment:
        Variables:
          SPRING_PROFILES_ACTIVE: !Ref EnvironmentShortname
          VERIGATE_COGNITO_ENABLED: !Sub "{{resolve:ssm:/${AWS::StackName}/cognito/enabled}}"
          VERIGATE_COGNITO_USER_POOL_ID: !Sub "{{resolve:ssm:/${AWS::StackName}/cognito/user-pool-id}}"
          VERIGATE_COGNITO_REGION: !Sub "{{resolve:ssm:/${AWS::StackName}/cognito/region}}"
          VERIGATE_COGNITO_APP_CLIENT_ID: !Sub "{{resolve:ssm:/${AWS::StackName}/cognito/app-client-id}}"
          VERIGATE_VERIFICATION_QUEUE_NAME: !Sub "{{resolve:ssm:/${AWS::StackName}/queues/verify-party/name}}"
          VERIGATE_COMMAND_STORE_TABLE: !Sub "{{resolve:ssm:/${AWS::StackName}/tables/command-store/name}}"
          VERIGATE_API_KEYS_TABLE: !Sub "{{resolve:ssm:/${AWS::StackName}/tables/api-keys/name}}"
          VERIGATE_PARTNER_CREATE_QUEUE_NAME: !Sub "{{resolve:ssm:/${AWS::StackName}/queues/partner-create/name}}"
          VERIGATE_PARTNER_TABLE: !Sub "{{resolve:ssm:/${AWS::StackName}/tables/partner/name}}"
          VERIGATE_CORS_ALLOWED_ORIGINS: "https://*.verigate.co.za,http://localhost:3000"
          VERIGATE_HEALTH_DEEDSWEB_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/deedsweb-url}}"
          VERIGATE_HEALTH_DHA_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/dha-url}}"
          VERIGATE_HEALTH_WORLDCHECK_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/worldcheck-url}}"
          VERIGATE_HEALTH_EXPERIAN_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/experian-url}}"
          VERIGATE_HEALTH_TRANSUNION_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/transunion-url}}"
          VERIGATE_HEALTH_XDS_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/xds-url}}"
          VERIGATE_HEALTH_CIPC_URL: !Sub "{{resolve:ssm:/${AWS::StackName}/health/cipc-url}}"
          VERIGATE_KINESIS_STREAM_NAME: !Sub "{{resolve:ssm:/${AWS::StackName}/kinesis/stream-name}}"
          VERIGATE_HEALTH_SNAPSHOT_TABLE_NAME: !Sub "{{resolve:ssm:/${AWS::StackName}/tables/health-snapshots/name}}"
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebBffApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebBffApi
            Path: /
            Method: ANY
        HealthSnapshotSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: "Capture health snapshot every 15 minutes"
            Input: '{"httpMethod":"POST","path":"/api/admin/system-health/snapshot","body":"","headers":{"Content-Type":"application/json"}}'

  WebBffApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCustomDomain
    Properties:
      ApiId: !Ref WebBffApi
      DomainName: !Ref ApiDomainName
      Stage: $default

  WebBffFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Errors in ${AWS::StackName}-api Lambda"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WebBffFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  WebBffApi5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "5xx errors on ${AWS::StackName} API Gateway"
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref WebBffApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alarms"
      DisplayName: WebBffAlarms

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${WebBffApi}.execute-api.${AWS::Region}.amazonaws.com"
  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt WebBffFunction.Arn
