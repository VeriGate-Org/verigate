#
# VeriGate Income Verification Adapter Configuration
# Income Verification API Integration
#

#
# Retry config for Command Handlers
#
# the maximum number of times an operation should be retried before giving up
verifications.retry.max-attempts=2
verifications.retry.delay-ms=10

#
# Income Verification API Configuration
#

# Base API URL for Income Verification API
# INCOME_API_URL=https://income-api-dev.verigate.co.za/api/v1

# Authentication credentials (provided via environment variables for security)
# INCOME_API_KEY=your-api-key

#
# HTTP Client Configuration
#

# HTTP timeout settings
income.http.timeout-seconds=30
income.http.retry-attempts=3
income.http.retry-delay-ms=1000

#
# Income Verification Configuration
#

# Income verification ID prefix for generated verification IDs
income.verification-id-prefix=INC-

# Variance threshold percentage for income matching (declared vs verified)
income.variance-threshold-percentage=10.0

#
# API Rate Limiting Configuration
#

# Requests per second limit
income.rate-limit.requests-per-second=10

# Burst capacity for rate limiting
income.rate-limit.burst-capacity=20

#
# Monitoring and Logging Configuration
#

# Enable detailed request logging (disable in production)
income.logging.request-enabled=false

# Enable detailed response logging (disable in production)
income.logging.response-enabled=false

# Log level for income operations
income.logging.level=INFO

#
# Performance Tuning
#

# Connection pool size for HTTP client
income.http.connection-pool-size=5

# Keep-alive timeout for HTTP connections (in seconds)
income.http.keep-alive-timeout-seconds=60

# Maximum idle connections
income.http.max-idle-connections=3

#
# Evidence Source Configuration
#

# Enable payslip cross-referencing (via Document Verification service P2.4)
income.evidence.payslip-enabled=true

# Enable bank statement analysis
income.evidence.bank-statement-enabled=true

# Enable employer confirmation
income.evidence.employer-confirmation-enabled=true

#
# Data Validation Configuration
#

# Enable ID number format validation
income.validation.enable-id-number-validation=true

# Enable income amount range validation
income.validation.enable-income-range-validation=true

# Minimum valid monthly income amount
income.validation.min-monthly-income=0

# Maximum valid monthly income amount
income.validation.max-monthly-income=99999999.99

#
# Cache Configuration (for future use)
#

# Enable caching for income verification data
income.cache.enable-income-data=false

# Cache TTL for income data (in minutes)
income.cache.income-data-ttl-minutes=15