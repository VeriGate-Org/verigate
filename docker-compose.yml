services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs,s3
      - DEFAULT_REGION=eu-west-1
      - EAGER_SERVICE_LOADING=1
    volumes:
      - "./dev/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - localstack-data:/var/lib/localstack

volumes:
  localstack-data:
