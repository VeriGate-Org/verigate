AWSTemplateFormatVersion: "2010-09-09"

Transform: AWS::Serverless-2016-10-31
# DatadogServerless macro removed - requires macro to be deployed per account
# Re-enable when Datadog is configured:
#  - Name: DatadogServerless
#    Parameters:
#      stackName: !Sub ${AWS::StackName}
#      javaLayerVersion: 14
#      extensionLayerVersion: 57
#      site: "datadoghq.eu"
#      apiKeySecretArn: "{{resolve:ssm:/datadog/agent-secret-arn}}"

Parameters:
  ApplicationVersion:
    Type: String
    Description: "The latest version tag for the application"
  EnvironmentShortname:
    Type: String
    Description: "Environment shortname (dev, prod)"
  VerigateDomainName:
    Type: String
    Description: "The Verigate system domain name"
    Default: "{{resolve:ssm:/verigate/api-gateway/domain-name:1}}"
  KinesisStreamArn:
    Type: String
    Description: "The kinesis stream arn"
    Default: "{{resolve:ssm:/verigate/events/kinesis/stream-arn:1}}"

Conditions:
  IsDevCondition:
    Fn::Equals:
      - !Ref EnvironmentShortname
      - "dev"
  DatadogIntegrationDisabledCondition:
    Condition: IsDevCondition

Globals:
  Function:
    MemorySize: 2048
    Timeout: 30
    Runtime: java21
    AutoPublishAlias: live
    # SnapStart disabled - GrowthBook feature flag initialization requires
    # network access which is unavailable during SnapStart snapshot phase.
    # Re-enable after making GrowthBook init lazy (deferred to first invocation).
    # SnapStart:
    #   ApplyOn: PublishedVersions
    DeploymentPreference:
      Type: AllAtOnce
    LoggingConfig:
      ApplicationLogLevel: INFO
      LogFormat: JSON
    Environment:
      Variables:
        # Datadog
        DD_ENV: !Sub "sds-${EnvironmentShortname}"
        DD_SERVICE: verigate
        DD_VERSION: !Ref ApplicationVersion
        DD_SERVERLESS_APPSEC_ENABLED:
          !If [DatadogIntegrationDisabledCondition, "false", "true"]
        DD_SERVERLESS_LOGS_ENABLED:
          !If [DatadogIntegrationDisabledCondition, "false", "true"]
        DD_TRACE_ENABLED:
          !If [DatadogIntegrationDisabledCondition, "false", "true"]
        DD_TAGS: !Sub "stack_parent:${AWS::StackName}"
        DD_FLUSH_TO_LOG:
          !If [DatadogIntegrationDisabledCondition, "false", "true"]
        DD_ENHANCED_METRICS:
          !If [DatadogIntegrationDisabledCondition, "false", "true"]
        # Dynamo
        VERIFICATION_COMMAND_STORE_DB: !Sub ${AWS::StackName}-command-store-table
        # Kinesis
        EVENT_STREAM_NAME: !Sub "{{resolve:ssm:/${AWS::StackName}/events/kinesis/stream-name}}"
        # SQS
        WORLDCHECK_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-worldcheck
        QLINK_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-qlink
        OPENSANCTIONS_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-opensanctions
        DHA_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-dha
        CIPC_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-cipc
        DEEDSWEB_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-deedsweb
        EMPLOYMENT_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-employment
        NEGATIVENEWS_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-negativenews
        FRAUDWATCHLIST_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-fraudwatchlist
        DOCUMENT_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-document
        SAQA_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-saqa
        CREDITBUREAU_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-creditbureau
        SARS_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-sars
        INCOME_ADAPTER_QUEUE_NAME: !Sub ${AWS::StackName}-adapter-income
    VpcConfig:
      SecurityGroupIds:
        - "{{resolve:ssm:/platform/security_groups/verigate_verigate_verification}}"
      SubnetIds:
        - "{{resolve:ssm:/platform/privateSubnet-1}}"
        - "{{resolve:ssm:/platform/privateSubnet-2}}"
        - "{{resolve:ssm:/platform/privateSubnet-3}}"

Resources:
  VerificationErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm for Lambdas Errors"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub "${AWS::StackName}-sqs-handlers"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic

  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alarms"
      DisplayName: LambdaErrorAlarms

  # Per-function error alarms
  VerifyPartyErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Errors in ${AWS::StackName}-verify-party-router"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub "${AWS::StackName}-verify-party-router"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  AdapterErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "High error rate across adapter functions in ${AWS::StackName}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  VerifyPartyDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "High duration for ${AWS::StackName}-verify-party-router"
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Sub "${AWS::StackName}-verify-party-router"
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 25000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  SqsDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Messages in DLQ for ${AWS::StackName}"
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Sub "${AWS::StackName}-verify-party-dlq"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  # SQS message age alarm - triggers when messages sit too long in queue
  SqsMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "SQS message age exceeds threshold for ${AWS::StackName}-verify-party"
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !Sub "${AWS::StackName}-verify-party"
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  # Lambda error rate alarm - triggers when error rate exceeds 5%
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Lambda error rate >5% for ${AWS::StackName}-verify-party-router"
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Sub "${AWS::StackName}-verify-party-router"
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Sub "${AWS::StackName}-verify-party-router"
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: error_rate
          Expression: "IF(invocations > 0, errors / invocations * 100, 0)"
          Label: "Error Rate %"
          ReturnData: true
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      TreatMissingData: notBreaching

  ## Lambda Functions
  VerifyPartyLambdaHandler:
    Type: AWS::Serverless::Function
    Properties:
      Role: !Sub "{{resolve:ssm:/application/iam-role/${AWS::StackName}-${EnvironmentShortname}/arn}}"
      FunctionName: !Sub "${AWS::StackName}-verify-party-router"
      Handler: verigate.verification.cg.infrastructure.functions.lambda.handlers.VerifyPartyCommandLambdaHandler::handleRequest
      CodeUri: ../../src/verigate-command-gateway/verigate-command-gateway-infrastructure
      Environment:
        Variables:
          VERIFY_PARTY_IMQ_NAME: !Sub "${AWS::StackName}-verify-party-imq"
          VERIFY_PARTY_DLQ_NAME: !Sub "${AWS::StackName}-verify-party-dlq"
      Events:
        VerigateVerifyPartyQueueCommand:
          Type: SQS
          Properties:
            Queue: !Sub "{{resolve:ssm:/${AWS::StackName}/queues/verify-party/arn}}"
            BatchSize: 10
        ScheduleEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(5 minutes)"
            Name: !Sub "${AWS::StackName}-verify-party-kw"
            RetryPolicy:
              MaximumEventAgeInSeconds: 60
              MaximumRetryAttempts: 0

