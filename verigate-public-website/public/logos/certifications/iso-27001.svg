<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M100 10 L180 45 L180 110 Q180 160 100 190 Q20 160 20 110 L20 45 Z" fill="url(#shieldGrad)" stroke="#0f2d52" stroke-width="2"/>
  <!-- Inner border -->
  <path d="M100 22 L170 52 L170 112 Q170 155 100 180 Q30 155 30 112 L30 52 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Checkmark circle -->
  <circle cx="100" cy="82" r="32" fill="none" stroke="#4ade80" stroke-width="3"/>
  <polyline points="82,82 95,96 120,70" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ISO text -->
  <text x="100" y="40" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" letter-spacing="2">ISO</text>
  <!-- 27001 text -->
  <text x="100" y="140" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold">27001</text>
  <!-- Certified text -->
  <text x="100" y="160" text-anchor="middle" fill="#94b8db" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="1">CERTIFIED</text>
  <!-- Info Security text -->
  <text x="100" y="174" text-anchor="middle" fill="#94b8db" font-family="Arial, Helvetica, sans-serif" font-size="8" letter-spacing="0.5">INFORMATION SECURITY</text>
</svg>