# OpenSanctions Adapter Test Configuration
# Configuration optimized for testing with reduced timeouts and mock settings

# API Configuration (for testing with mock services)
opensanctions.api.baseUrl=http://localhost:8080
opensanctions.connection.timeout.ms=5000
opensanctions.read.timeout.ms=10000

# Reduced Retry Configuration for faster tests
opensanctions.retry.attempts=1
opensanctions.retry.delay.ms=100

# Test Search Parameters
opensanctions.default.dataset=sanctions
opensanctions.default.limit=5
opensanctions.default.threshold=0.8
opensanctions.default.cutoff=0.6
opensanctions.default.algorithm=logic-v1

# Verbose logging for test debugging
logging.level.verigate.adapter.opensanctions=DEBUG
logging.level.verigate.adapter.opensanctions.infrastructure.http=TRACE