name: Release | VeriGate Production

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: verigate-prod
  cancel-in-progress: false

jobs:
  install:
    uses: ./.github/workflows/_install.yml
    with:
      java-version: "21"
    permissions:
      contents: read
      packages: read
    secrets: inherit

  prod-deploy:
    needs: [install]
    uses: ./.github/workflows/_release.verigate.yml
    concurrency: verigate-prod-deploy
    with:
      java-version: "21"
      environment: prod
      github-environment: verigate-prod
      application-name: verigate
    permissions:
      id-token: write
      contents: read
      packages: write
    secrets: inherit

  prod-smoke-test:
    needs: [prod-deploy]
    uses: ./.github/workflows/_smoke-test.yml
    with:
      environment: prod
      github-environment: verigate-prod
    permissions:
      id-token: write
      contents: read
    secrets: inherit
