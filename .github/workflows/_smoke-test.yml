name: _smoke_test

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      github-environment:
        required: true
        type: string
      resource-prefix:
        description: "Prefix for infrastructure resources (SQS, DynamoDB). Defaults to STACK_NAME if not set."
        required: false
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    environment: ${{ inputs.github-environment }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify Lambda functions are active
        run: |
          STACK_NAME="${{ vars.STACK_NAME }}"
          FUNCTIONS=(
            "${STACK_NAME}-verify-party-router"
            "${STACK_NAME}-verify-bank-account-details"
            "${STACK_NAME}-verify-identity"
            "${STACK_NAME}-verify-company-details"
            "${STACK_NAME}-verify-property-ownership"
            "${STACK_NAME}-verify-employment"
            "${STACK_NAME}-screen-negative-news"
            "${STACK_NAME}-screen-fraud-watchlist"
            "${STACK_NAME}-verify-document"
            "${STACK_NAME}-verify-qualification"
            "${STACK_NAME}-perform-credit-check"
            "${STACK_NAME}-verify-tax-compliance"
            "${STACK_NAME}-verify-income"
            "${STACK_NAME}-create-partner"
            "${STACK_NAME}-update-partner-config"
            "${STACK_NAME}-usage-event-consumer"
            "${STACK_NAME}-usage-aggregator"
          )

          FAILED=0
          for FN in "${FUNCTIONS[@]}"; do
            STATE=$(aws lambda get-function --function-name "$FN" --query 'Configuration.State' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$STATE" != "Active" ]; then
              echo "FAIL: $FN is $STATE"
              FAILED=1
            else
              echo "OK: $FN is Active"
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "Some Lambda functions are not active!"
            exit 1
          fi

      - name: Verify SQS queues exist
        run: |
          RESOURCE_PREFIX="${{ inputs.resource-prefix || vars.STACK_NAME }}"
          QUEUES=(
            "${RESOURCE_PREFIX}-verify-party"
            "${RESOURCE_PREFIX}-adapter-qlink"
            "${RESOURCE_PREFIX}-adapter-cipc"
            "${RESOURCE_PREFIX}-adapter-dha"
            "${RESOURCE_PREFIX}-adapter-deedsweb"
          )

          for Q in "${QUEUES[@]}"; do
            URL=$(aws sqs get-queue-url --queue-name "$Q" --query 'QueueUrl' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$URL" = "NOT_FOUND" ]; then
              echo "FAIL: Queue $Q not found"
              exit 1
            else
              echo "OK: Queue $Q exists"
            fi
          done

      - name: Verify DynamoDB tables are active
        run: |
          RESOURCE_PREFIX="${{ inputs.resource-prefix || vars.STACK_NAME }}"
          TABLES=(
            "${RESOURCE_PREFIX}-command-store-table"
            "${RESOURCE_PREFIX}-partner-hub"
            "${RESOURCE_PREFIX}-api-keys-table"
          )

          for T in "${TABLES[@]}"; do
            STATUS=$(aws dynamodb describe-table --table-name "$T" --query 'Table.TableStatus' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$STATUS" != "ACTIVE" ]; then
              echo "FAIL: Table $T is $STATUS"
              exit 1
            else
              echo "OK: Table $T is ACTIVE"
            fi
          done

          echo "All smoke tests passed!"
