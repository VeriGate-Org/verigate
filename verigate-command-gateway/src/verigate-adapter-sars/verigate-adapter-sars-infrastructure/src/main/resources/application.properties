#
# VeriGate SARS Tax Compliance Adapter Configuration
# SARS eFiling API Integration
#

#
# Retry config for Command Handlers
#
# the maximum number of times an operation should be retried before giving up
verifications.retry.max-attempts=2
verifications.retry.delay-ms=10

#
# SARS eFiling API Configuration
#

# Base API URL for SARS eFiling API
# SARS_API_URL=https://sars-efiling-api-dev.verigate.co.za/api/v1

# Authentication credentials (provided via environment variables for security)
# SARS_API_KEY=your-api-key

#
# HTTP Client Configuration
#

# HTTP timeout settings
sars.http.timeout-seconds=30
sars.http.retry-attempts=3
sars.http.retry-delay-ms=1000

#
# Tax Compliance Verification Configuration
#

# Tax compliance verification ID prefix for generated verification IDs
sars.tax-compliance.verification-id-prefix=SARS-

#
# API Rate Limiting Configuration
#

# Requests per second limit (SARS has conservative rate limits)
sars.rate-limit.requests-per-second=5

# Burst capacity for rate limiting
sars.rate-limit.burst-capacity=10

#
# Monitoring and Logging Configuration
#

# Enable detailed request logging (disable in production)
sars.logging.request-enabled=false

# Enable detailed response logging (disable in production)
sars.logging.response-enabled=false

# Log level for SARS operations
sars.logging.level=INFO

#
# Performance Tuning
#

# Connection pool size for HTTP client
sars.http.connection-pool-size=5

# Keep-alive timeout for HTTP connections (in seconds)
sars.http.keep-alive-timeout-seconds=60

# Maximum idle connections
sars.http.max-idle-connections=3

#
# Data Validation Configuration
#

# Enable tax reference number format validation
sars.validation.enable-tax-reference-validation=true

# Enable ID number format validation (SA 13-digit ID)
sars.validation.enable-id-number-validation=true

#
# Cache Configuration (for future use)
#

# Enable caching for tax compliance data
sars.cache.enable-compliance-data=false

# Cache TTL for tax compliance data (in minutes)
sars.cache.compliance-data-ttl-minutes=15
