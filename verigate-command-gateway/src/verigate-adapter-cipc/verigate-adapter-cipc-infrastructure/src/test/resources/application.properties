#
# VeriGate CIPC Adapter Test Configuration
#

#
# Retry config for Command Handlers (reduced for faster tests)
#
verifications.retry.max-attempts=1
verifications.retry.delay-ms=1

#
# CIPC Public Data API Configuration (test values)
#

# Test timeouts (reduced for faster tests)
cipc.http.timeout-seconds=5
cipc.http.retry-attempts=1
cipc.http.retry-delay-ms=10

#
# Rate Limiting (relaxed for tests)
#
cipc.rate-limit.requests-per-second=100
cipc.rate-limit.burst-capacity=200

#
# Monitoring and Logging (enabled for test debugging)
#
cipc.logging.request-enabled=true
cipc.logging.response-enabled=true
cipc.logging.level=DEBUG

#
# Test-specific configuration
#
cipc.test.mock-responses=true
cipc.test.enable-validation=false