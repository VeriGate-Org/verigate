name: Rollback

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to rollback"
        required: true
        type: choice
        options:
          - verigate-command-gateway
          - partner-portal
          - web-bff
          - public-website
      stage:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      commit-sha:
        description: "Commit SHA to rollback to"
        required: true
        type: string

concurrency:
  group: ${{ inputs.service }}-${{ inputs.stage }}-rollback
  cancel-in-progress: false

jobs:
  rollback-verigate:
    if: inputs.service == 'verigate-command-gateway'
    uses: ./.github/workflows/_release-terraform.yml
    with:
      environment: ${{ inputs.stage }}
      github-environment: verigate-${{ inputs.stage }}
      application-name: verigate
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  rollback-verigate-sam:
    if: inputs.service == 'verigate-command-gateway'
    needs: [rollback-verigate]
    uses: ./.github/workflows/_release-sam.yml
    with:
      environment: ${{ inputs.stage }}
      github-environment: verigate-${{ inputs.stage }}
      application-name: verigate
      java-version: "21"
    permissions:
      id-token: write
      contents: read
      packages: read
    secrets: inherit

  rollback-partner-portal:
    if: inputs.service == 'partner-portal'
    runs-on: ubuntu-latest
    environment: verigate-${{ inputs.stage }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit-sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: verigate-partner-portal/package-lock.json

      - name: Install dependencies
        working-directory: verigate-partner-portal
        run: npm ci

      - name: Build
        working-directory: verigate-partner-portal
        env:
          NEXT_PUBLIC_BFF_BASE_URL: ${{ vars.BFF_BASE_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.PORTAL_API_KEY }}
          NEXT_PUBLIC_USE_MOCK: ${{ vars.USE_MOCK }}
          NEXT_PUBLIC_ENV: ${{ vars.ENVIRONMENT_SHORTNAME }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        working-directory: verigate-partner-portal
        run: aws s3 sync out/ s3://${{ vars.STACK_NAME }}-partner-portal-${{ vars.ENVIRONMENT_SHORTNAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ vars.STACK_NAME }}-partner-portal-${{ vars.ENVIRONMENT_SHORTNAME }}.s3.${{ vars.AWS_REGION }}.amazonaws.com'].Id" --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi

  rollback-web-bff:
    if: inputs.service == 'web-bff'
    runs-on: ubuntu-latest
    environment: verigate-${{ inputs.stage }}
    permissions:
      id-token: write
      contents: read
      packages: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit-sha }}

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retrieve Maven cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: SAM build
        run: MAVEN_OPTS="-Dmaven.test.skip=true" sam build -t verigate-web-bff/iac/sam/template.yaml

      - name: SAM deploy
        run: |
          sam deploy -t .aws-sam/build/template.yaml \
            --stack-name=verigate-web-bff-${{ vars.ENVIRONMENT_SHORTNAME }} \
            --resolve-s3 \
            --region=${{ vars.AWS_REGION }} \
            --s3-prefix=verigate-web-bff-${{ vars.ENVIRONMENT_SHORTNAME }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --on-failure DELETE \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides "ParameterKey=ApplicationVersion,ParameterValue=${{ inputs.commit-sha }} ParameterKey=EnvironmentShortname,ParameterValue=${{ vars.ENVIRONMENT_SHORTNAME }}"

  rollback-public-website:
    if: inputs.service == 'public-website'
    runs-on: ubuntu-latest
    environment: verigate-${{ inputs.stage }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit-sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: verigate-public-website/package-lock.json

      - name: Install dependencies
        working-directory: verigate-public-website
        run: npm ci

      - name: Build
        working-directory: verigate-public-website
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        working-directory: verigate-public-website
        run: aws s3 sync dist/ s3://${{ vars.STACK_NAME }}-public-website-${{ vars.ENVIRONMENT_SHORTNAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ vars.STACK_NAME }}-public-website-${{ vars.ENVIRONMENT_SHORTNAME }}.s3.${{ vars.AWS_REGION }}.amazonaws.com'].Id" --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          fi
