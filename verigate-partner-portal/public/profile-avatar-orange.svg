  <path d="M48 54c-10 0-20 6.5-22.5 18.5-.2.9.4 1.5 1.2 1.5H69.3c.9 0 1.5-.7 1.3-1.6C67.8 60 58.5 54 48 54Z" fill="url(#clothing)"/>
