server:
  port: 8080

spring:
  application:
    name: verigate-web-bff
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    verigate.webbff: DEBUG
    org.springframework.security: WARN

verigate:
  aws:
    region: ${AWS_REGION:eu-west-1}
    sqs-endpoint: ${AWS_SQS_ENDPOINT:}
    dynamodb-endpoint: ${AWS_DYNAMODB_ENDPOINT:}
    s3-endpoint: ${AWS_S3_ENDPOINT:}
  documents:
    s3-bucket-name: ${VERIGATE_DOCUMENTS_BUCKET:verigate-documents}
  auth:
    cognito:
      enabled: ${VERIGATE_COGNITO_ENABLED:false}
      user-pool-id: ${VERIGATE_COGNITO_USER_POOL_ID:}
      region: ${VERIGATE_COGNITO_REGION:af-south-1}
      app-client-id: ${VERIGATE_COGNITO_APP_CLIENT_ID:}
    rate-limit:
      enabled: ${VERIGATE_RATE_LIMIT_ENABLED:true}
      default-requests-per-minute: ${VERIGATE_RATE_LIMIT_DEFAULT:100}
    api-keys-table: ${VERIGATE_API_KEYS_TABLE:verigate-api-keys}
  partner:
    create-queue-name: ${VERIGATE_PARTNER_CREATE_QUEUE_NAME:partner-create}
    table-name: ${VERIGATE_PARTNER_TABLE:verigate-partner-table}
    data-table: ${VERIGATE_PARTNER_DATA_TABLE:verigate-partner-data}
  verification:
    queue-name: ${VERIGATE_VERIFICATION_QUEUE_NAME:verify-party}
    command-store:
      table-name: ${VERIGATE_COMMAND_STORE_TABLE:verification-command-store}
    response:
      poll-timeout-ms: ${VERIGATE_RESPONSE_POLL_TIMEOUT_MS:50}
      poll-max-attempts: ${VERIGATE_RESPONSE_POLL_MAX_ATTEMPTS:1}
  cases:
    table-name: ${VERIGATE_CASES_TABLE:cases}
  policy:
    table-name: ${VERIGATE_POLICY_TABLE:policies}
  monitoring:
    subjects-table-name: ${VERIGATE_MONITORING_SUBJECTS_TABLE:monitored-subjects}
    alerts-table-name: ${VERIGATE_MONITORING_ALERTS_TABLE:monitoring-alerts}
  risk:
    assessment:
      table-name: ${VERIGATE_RISK_ASSESSMENT_TABLE:risk-assessments}
    scoring-config:
      table-name: ${VERIGATE_RISK_SCORING_CONFIG_TABLE:risk-scoring-config}
