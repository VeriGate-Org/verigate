#
# VeriGate SARS Tax Compliance Adapter Test Configuration
#

#
# Retry config for Command Handlers (reduced for faster tests)
#
verifications.retry.max-attempts=1
verifications.retry.delay-ms=1

#
# SARS eFiling API Configuration (test values)
#

# Test timeouts (reduced for faster tests)
sars.http.timeout-seconds=5
sars.http.retry-attempts=1
sars.http.retry-delay-ms=10

#
# Rate Limiting (relaxed for tests)
#
sars.rate-limit.requests-per-second=100
sars.rate-limit.burst-capacity=200

#
# Monitoring and Logging (enabled for test debugging)
#
sars.logging.request-enabled=true
sars.logging.response-enabled=true
sars.logging.level=DEBUG

#
# Test-specific configuration
#
sars.test.mock-responses=true
sars.test.enable-validation=false
